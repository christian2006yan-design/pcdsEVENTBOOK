<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url('Poly.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    width:600px;
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo{
    width:90px;
    margin-bottom:10px;
}

h2{
    margin:10px 0;
    color:#0f172a;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
    box-sizing:border-box;
}

input:focus{
    outline:none;
    border-color:#1f3b73;
}

button,
.btn-link{
    width:100%;
    display:block;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
    box-sizing:border-box;
    text-align:center;
}

button{
    background:#1f3b73;
    color:white;
    border:none;
}

button:hover{
    background:#2e5aa7;
}

.btn-link{
    background:#64748b;
    color:white;
    text-decoration:none;
    border:none;
}

.btn-link:hover{
    background:#475569;
}

/* ERROR BOX */
.error{
    color:white;
    background:#ef4444;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    font-size:14px;
    display:none;
}

/* TOAST */
.toast{
    position:fixed;
    top:20px;
    right:20px;
    background:#22c55e;
    color:white;
    padding:15px 20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    font-size:14px;
    opacity:0;
    transform:translateY(-20px);
    transition:0.4s;
    z-index:999;
}

.toast.show{
    opacity:1;
    transform:translateY(0);
}
</style>
</head>

<body>

<div class="box">

    <img src="PCDS.png" class="logo" alt="Logo">

    <h2>PCDS EVENT CENTER</h2>

    <div class="error" id="errorBox"></div>

    <!-- SUCCESS TOAST -->
    <div id="toast" class="toast">
        Created Successfully!
    </div>

    <form action="#" method="POST">

        <input type="text" name="username" placeholder="Email" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="button" onclick="registerUser()">
            Create Account
        </button>

    </form>

    <a href="inex.html" class="btn-link">
        Back to Login
    </a>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBukgYgCfvIi_Z8CJ8PQi2TiHkXwbp2GEg",
authDomain: "pcds-booking-6727c.firebaseapp.com",
projectId: "pcds-booking-6727c",
storageBucket: "pcds-booking-6727c.firebasestorage.app",
messagingSenderId: "193663771576",
appId: "1:193663771576:web:413ec2d11294412e97a54d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.registerUser = async function(){

const email = document.querySelector("input[name='username']").value.trim();
const password = document.querySelector("input[name='password']").value.trim();

const errorBox = document.getElementById("errorBox");

// reset error
errorBox.style.display = "none";
errorBox.innerText = "";

// EMAIL VALIDATION
if(!email.endsWith("@gmail.com")){
    errorBox.style.display = "block";
    errorBox.innerText = "Email must end with @gmail.com";
    return;
}

// PASSWORD VALIDATION
if(password.length < 10){
    errorBox.style.display = "block";
    errorBox.innerText = "Password must be at least 10 characters";
    return;
}

try {

  await createUserWithEmailAndPassword(auth, email, password);

  const toast = document.getElementById("toast");

  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
    window.location.href = "login.html";
  }, 2000);

} catch (error) {
  errorBox.style.display = "block";
  errorBox.innerText = error.message;
}

}
</script>

</body>
</html>
