<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url('Poly.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    width:600px;
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo{
    width:90px;
    margin-bottom:10px;
}

h2{
    margin:10px 0;
    color:#0f172a;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#1f3b73;
    color:white;
    border:none;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    background:#2e5aa7;
}

.error{
    color:white;
    background:#ef4444;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}

.link-btn{
    background:#64748b;
}

.link-btn:hover{
    background:#475569;
}
</style>
</head>

<body>

<div class="box">

    <img src="PCDS.png" class="logo" alt="Logo">

    <h2>PCDS EVENT CENTER</h2>

    <!-- Error Message -->
    <div class="error" id="errorBox" style="display:none;"></div>

    <form action="#" method="POST">
        <input type="text" name="username" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="button" onclick="loginUser()">Login</button>
    </form>

    <a href="register.html">
        <button type="button" class="link-btn">Create Account</button>
    </a>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBukgYgCfvIi_Z8CJ8PQi2TiHkXwbp2GEg",
    authDomain: "pcds-booking-6727c.firebaseapp.com",
    projectId: "pcds-booking-6727c",
    storageBucket: "pcds-booking-6727c.firebasestorage.app",
    messagingSenderId: "193663771576",
    appId: "1:193663771576:web:413ec2d11294412e97a54d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.loginUser = async function(){

    const username = document.querySelector("input[name='username']").value.trim();
    const password = document.querySelector("input[name='password']").value.trim();
    const errorBox = document.getElementById("errorBox");

    // Clear previous error
    errorBox.style.display = "none";

    // Check empty fields
    if(!username || !password){
        errorBox.style.display = "block";
        errorBox.innerText = "Please fill all fields";
        return;
    }

    // Check email format
    if(!username.endsWith("@gmail.com")){
        errorBox.style.display = "block";
        errorBox.innerText = "Email must be @gmail.com";
        return;
    }

    // Check password length
    if(password.length < 9){
        errorBox.style.display = "block";
        errorBox.innerText = "Password must be at least 9 characters";
        return;
    }

    try {
        await signInWithEmailAndPassword(auth, username, password);
        localStorage.setItem("loggedInUser", username);
        alert("Login success!");

        // ADMIN account
        if(username === "admin1@gmail.com"){
            window.location.href = "dashboard.html";
        } else {
            // Guest/User account
            window.location.href = "guest.html";
        }

    } catch (error) {
        errorBox.style.display = "block";
        errorBox.innerText = "Invalid username or password";
    }
}
</script>

</body>
</html>
